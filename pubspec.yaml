name: scoliocare_app
description: "ScolioCare - AI-powered scoliosis monitoring and exercise tracking app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.6 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  sensors_plus: ^4.0.2
  camera: ^0.10.5+9
  image_picker: ^1.0.7
  share_plus: ^7.2.2
  path_provider: ^2.1.2
  fl_chart: ^0.66.2
  intl: ^0.18.1
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
